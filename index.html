<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Panel de Ruta · Fernando</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Cifras monetarias alineadas (tabular) — legibilidad en campo */
        .tnum { font-variant-numeric: tabular-nums; }
        .sheet { transition: transform .28s ease; }
        .sheet-hidden { transform: translateY(100%); }
        .backdrop { transition: opacity .2s ease; }
        @keyframes pulse-soft { 0%,100%{opacity:1} 50%{opacity:.45} }
        .pulse-soft { animation: pulse-soft 1.6s ease-in-out infinite; }
        .toast { transition: opacity .25s ease, transform .25s ease; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen pb-10">

    <!-- ============ HEADER: marca + estado de conectividad/sync ============ -->
    <header class="sticky top-0 z-30 bg-gray-900/95 backdrop-blur border-b border-gray-800">
        <div class="max-w-md mx-auto px-4 pt-4 pb-3">
            <div class="flex justify-between items-center mb-3">
                <div>
                    <h1 class="font-bold text-lg leading-none">Panel de Ruta</h1>
                    <p class="text-[11px] text-gray-500 mt-1">Fernando · Ventas de campo</p>
                </div>
                <div class="text-right">
                    <div class="text-[11px] text-gray-500">Ventas del período</div>
                    <div id="kpi-ventas" class="text-emerald-400 font-bold text-xl tnum">$0</div>
                </div>
            </div>

            <!-- Pastilla de estado: única en su tipo, refleja el corazón técnico de la app -->
            <button id="status-badge" onclick="App.manualSync()"
                class="w-full flex items-center justify-between gap-2 text-xs font-semibold px-3 py-2 rounded-xl border transition-colors">
                <span class="flex items-center gap-2">
                    <span id="status-dot" class="h-2 w-2 rounded-full bg-emerald-400"></span>
                    <span id="status-text">Verificando conexión…</span>
                </span>
                <span id="status-action" class="text-[11px] underline decoration-dotted opacity-80"></span>
            </button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-4">

        <!-- ============ ACCIONES PRINCIPALES ============ -->
        <div class="grid grid-cols-2 gap-3 my-5">
            <button onclick="App.abrirModal('Venta')"
                class="bg-emerald-600 active:bg-emerald-700 p-4 rounded-2xl font-bold text-base transition flex flex-col items-center gap-1">
                <i data-lucide="circle-dollar-sign" class="h-5 w-5"></i>
                Cargar Venta
            </button>
            <button onclick="App.abrirModal('Presupuesto')"
                class="bg-sky-600 active:bg-sky-700 p-4 rounded-2xl font-bold text-base transition flex flex-col items-center gap-1">
                <i data-lucide="file-text" class="h-5 w-5"></i>
                Nuevo Prospecto
            </button>
        </div>

        <!-- ============ ACTIVIDAD RECIENTE ============ -->
        <section>
            <div class="flex items-center justify-between mb-2">
                <h2 class="text-sm font-semibold text-gray-400">Actividad reciente</h2>
                <span id="pending-count" class="text-[11px] text-amber-400 hidden"></span>
            </div>
            <ul id="lista-actividad" class="space-y-2"></ul>
            <p id="empty-state" class="text-sm text-gray-500 text-center py-10 border border-dashed border-gray-700 rounded-xl">
                Todavía no registraste nada hoy.<br>Tocá un botón de arriba para empezar.
            </p>
        </section>
    </main>

    <!-- ============ MODAL (bottom sheet, alcance con el pulgar) ============ -->
    <div id="modal-backdrop" class="backdrop fixed inset-0 bg-black/70 opacity-0 pointer-events-none z-40"></div>
    <div id="modal-carga" class="sheet sheet-hidden fixed inset-x-0 bottom-0 z-50">
        <form id="form-carga" class="bg-gray-800 p-5 pb-8 rounded-t-3xl w-full max-w-md mx-auto space-y-3 border-t border-gray-700 max-h-[85vh] overflow-y-auto">
            <div class="h-1.5 w-10 bg-gray-600 rounded-full mx-auto mb-1"></div>

            <div class="flex items-center justify-between">
                <h2 class="font-bold text-lg">Registrar</h2>
                <span id="modal-tipo-chip" class="text-xs font-bold px-2.5 py-1 rounded-full"></span>
            </div>
            <input type="hidden" id="form-tipo">

            <div>
                <input type="text" id="input-cliente" placeholder="Nombre del cliente" required
                    autocomplete="off" autocapitalize="words" maxlength="120"
                    class="w-full bg-gray-900 p-3.5 rounded-xl border border-gray-700 focus:border-emerald-500 outline-none text-base">
                <p id="error-cliente" class="text-xs text-red-400 mt-1 hidden">Ingresá al menos 2 caracteres.</p>
            </div>

            <div>
                <div id="lineas-productos" class="space-y-2"></div>
                <button type="button" id="btn-agregar-linea"
                    class="w-full mt-2 text-sm text-emerald-400 border border-dashed border-emerald-500/40 rounded-xl py-2 active:bg-emerald-500/10">
                    + Agregar otro producto
                </button>
                <p id="error-lineas" class="text-xs text-red-400 mt-1 hidden">Agregá al menos un producto con cantidad y precio.</p>
            </div>

            <div class="flex justify-between items-center pt-1">
                <span class="text-sm text-gray-400">Total del pedido</span>
                <span id="total-pedido" class="text-lg font-bold text-emerald-400 tnum">$0</span>
            </div>

            <div>
                <input type="file" id="input-foto" accept="image/*" capture="environment" class="hidden">
                <button type="button" id="btn-tomar-foto"
                    class="w-full flex items-center justify-center gap-2 text-sm text-gray-300 border border-gray-700 rounded-xl py-2.5 active:bg-gray-700">
                    <span>📷</span><span id="btn-foto-label">Adjuntar foto del pedido (opcional)</span>
                </button>
                <div id="foto-preview-cont" class="hidden mt-2 relative inline-block">
                    <img id="foto-preview" class="h-20 w-20 object-cover rounded-lg border border-gray-700" alt="Foto del pedido">
                    <button type="button" id="btn-quitar-foto"
                        class="absolute -top-2 -right-2 bg-red-500 text-white rounded-full h-5 w-5 text-xs leading-none">✕</button>
                </div>
                <p id="foto-status" class="text-xs text-gray-500 mt-1 hidden"></p>
            </div>

            <textarea id="input-notas" placeholder="Notas adicionales (opcional)" rows="2" maxlength="500"
                class="w-full bg-gray-900 p-3.5 rounded-xl border border-gray-700 focus:border-emerald-500 outline-none text-base"></textarea>

            <button type="submit" id="btn-guardar"
                class="w-full bg-emerald-500 active:bg-emerald-600 disabled:opacity-50 disabled:active:bg-emerald-500 p-3.5 rounded-xl font-bold text-base transition">
                Guardar
            </button>
            <button type="button" onclick="App.cerrarModal()" class="w-full text-gray-400 py-1 text-sm">Cancelar</button>
        </form>
    </div>

    <!-- ============ TOAST ============ -->
    <div id="toast" class="toast fixed bottom-4 left-1/2 -translate-x-1/2 opacity-0 pointer-events-none z-[60] max-w-[90vw]">
        <div class="bg-gray-800 border border-gray-700 text-sm px-4 py-2.5 rounded-xl shadow-lg"></div>
    </div>

    /* =========================================================================
       CATALOG MATCH — normalización difusa, 100% local (ver normalize.js)
       ========================================================================= */
    const CatalogMatch = (() => {
        function levenshtein(a, b) {
            const m = a.length, n = b.length;
            if (m === 0) return n;
            if (n === 0) return m;
            let prev = new Array(n + 1), curr = new Array(n + 1);
            for (let j = 0; j <= n; j++) prev[j] = j;
            for (let i = 1; i <= m; i++) {
                curr[0] = i;
                for (let j = 1; j <= n; j++) {
                    const cost = a[i - 1] === b[j - 1] ? 0 : 1;
                    curr[j] = Math.min(prev[j] + 1, curr[j - 1] + 1, prev[j - 1] + cost);
                }
                [prev, curr] = [curr, prev];
            }
            return prev[n];
        }
        function normalizeText(str) {
            return String(str || "").toLowerCase()
                .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                .replace(/[^a-z0-9\s%.,-]/g, " ")
                .replace(/\s+/g, " ").trim();
        }
        function similarity(a, b) {
            const na = normalizeText(a), nb = normalizeText(b);
            if (na === nb) return 1;
            const maxLen = Math.max(na.length, nb.length);
            if (maxLen === 0) return 1;
            return 1 - levenshtein(na, nb) / maxLen;
        }
        function matchProduct(input, catalog, opts = {}) {
            const maxResults = opts.maxResults || 3;
            const normInput = normalizeText(input);
            if (!normInput) return [];
            const inputTokens = new Set(normInput.split(" "));
            const scored = catalog.map(producto => {
                const scoreNombre = similarity(normInput, producto.nombre_oficial);
                const nombreTokens = normalizeText(producto.nombre_oficial).split(" ");
                const tokensComunes = nombreTokens.filter(t => inputTokens.has(t)).length;
                const scoreTokens = nombreTokens.length ? tokensComunes / nombreTokens.length : 0;
                const scoreAlias = (producto.aliases || [])
                    .map(a => similarity(normInput, a))
                    .reduce((max, s) => Math.max(max, s), 0);
                // Prefijo: clave para que escribir pocas letras ("gl") ya muestre
                // opciones, como un buscador con autocompletado real.
                const scorePrefix = nombreTokens.reduce((max, t) => {
                    if (t.startsWith(normInput)) {
                        return Math.max(max, 0.5 + 0.5 * (normInput.length / t.length));
                    }
                    return max;
                }, 0);
                return { producto, score: Math.max(scoreNombre, scoreTokens, scoreAlias, scorePrefix) };
            });
            scored.sort((a, b) => b.score - a.score);
            return scored.slice(0, maxResults).map(r => ({
                producto: r.producto,
                score: Math.round(r.score * 100) / 100,
                confianza: r.score >= 0.85 ? "alta" : r.score >= 0.6 ? "media" : "baja"
            }));
        }
        return { matchProduct };
    })();

    /* =========================================================================
       UTILS
       ========================================================================= */
    const Utils = {
        uuid() {
            if (crypto && crypto.randomUUID) return crypto.randomUUID();
            return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);
        },
        money(n) {
            const v = Number(n) || 0;
            return "$" + v.toLocaleString(undefined, { maximumFractionDigits: 2 });
        },
        timeAgo(iso) {
            const diffMin = Math.round((Date.now() - new Date(iso).getTime()) / 60000);
            if (diffMin < 1) return "ahora";
            if (diffMin < 60) return diffMin + " min";
            const h = Math.round(diffMin / 60);
            if (h < 24) return h + " h";
            return new Date(iso).toLocaleDateString();
        }
    };

    /* =========================================================================
       STORE — capa de persistencia local (localStorage como cola + caché)
       Cada registro: { id, tipo, cliente, monto, notas, createdAt, synced, attempts, lastError }
       ========================================================================= */
    const Store = {
        getAll() {
            try {
                return JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY)) || [];
            } catch {
                return [];
            }
        },
        saveAll(records) {
            localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(records));
        },
        add(record) {
            const all = this.getAll();
            all.unshift(record);
            this.saveAll(all);
        },
        markSynced(id) {
            const all = this.getAll().map(r => r.id === id ? { ...r, synced: true, lastError: null } : r);
            this.saveAll(all);
        },
        markError(id, message) {
            const all = this.getAll().map(r =>
                r.id === id ? { ...r, attempts: (r.attempts || 0) + 1, lastError: message } : r
            );
            this.saveAll(all);
        },
        getPending() {
            return this.getAll().filter(r => !r.synced);
        },
        kpiVentas() {
            return this.getAll()
                .filter(r => r.tipo === "Venta")
                .reduce((sum, r) => sum + (Number(r.monto) || 0), 0);
        }
    };

    /* =========================================================================
       SYNC — envío al backend (Apps Script) con reintentos y cola offline
       Nota CORS: el body se envía como string SIN header Content-Type explícito.
       Esto lo convierte en una "simple request" (text/plain por defecto) y evita
       el preflight OPTIONS, que Apps Script Web Apps no resuelve de forma fiable.
       ========================================================================= */
    const Sync = {
        inFlight: false,

        async pushOne(record) {
            const body = record.kind === "foto"
                ? {
                    token: CONFIG.SHARED_SECRET,
                    accion: "foto",
                    idPedido: record.idPedido || "",
                    cliente: record.cliente,
                    fotoBase64: record.fotoBase64,
                    recordId: record.id
                }
                : {
                    token: CONFIG.SHARED_SECRET,
                    tipo: record.tipo,
                    cliente: record.cliente,
                    monto: record.monto,
                    notas: record.notas,
                    productoInput: record.productoInput || "",
                    productoNormalizado: record.productoNormalizado || "",
                    cantidad: record.cantidad || 0,
                    precioUnitario: record.precioUnitario || 0,
                    idPedido: record.idPedido || "",
                    clientTimestamp: record.createdAt,
                    recordId: record.id
                };

            const res = await fetch(CONFIG.SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify(body)
            });
            if (!res.ok) throw new Error("HTTP " + res.status);
            const data = await res.json();
            if (!data.ok) throw new Error(data.error || "Error del servidor");
            return data;
        },

        async flushQueue() {
            if (this.inFlight) return;
            if (!navigator.onLine) { UI.updateStatusBadge(); return; }

            const pending = Store.getPending();
            if (pending.length === 0) { UI.updateStatusBadge(); return; }

            this.inFlight = true;
            UI.updateStatusBadge();

            for (const record of pending) {
                try {
                    await this.pushOne(record);
                    Store.markSynced(record.id);
                } catch (err) {
                    Store.markError(record.id, err.message);
                }
                UI.refresh();
            }

            this.inFlight = false;
            UI.updateStatusBadge();
        }
    };

    /* =========================================================================
       UI — render y eventos de interfaz
       ========================================================================= */
    const UI = {
        toastTimer: null,

        toast(msg) {
            const el = document.getElementById("toast");
            el.querySelector("div").textContent = msg;
            el.classList.remove("opacity-0", "pointer-events-none");
            clearTimeout(this.toastTimer);
            this.toastTimer = setTimeout(() => el.classList.add("opacity-0", "pointer-events-none"), 2600);
        },

        updateStatusBadge() {
            const badge = document.getElementById("status-badge");
            const dot = document.getElementById("status-dot");
            const text = document.getElementById("status-text");
            const action = document.getElementById("status-action");
            const pending = Store.getPending().length;

            badge.className = "w-full flex items-center justify-between gap-2 text-xs font-semibold px-3 py-2 rounded-xl border transition-colors";
            dot.className = "h-2 w-2 rounded-full";

            if (!navigator.onLine) {
                badge.classList.add("bg-amber-500/10", "border-amber-500/40", "text-amber-300");
                dot.classList.add("bg-amber-400", "pulse-soft");
                text.textContent = pending > 0 ? `Sin conexión · ${pending} pendiente(s) guardados` : "Sin conexión · guardando localmente";
                action.textContent = "";
            } else if (Sync.inFlight) {
                badge.classList.add("bg-sky-500/10", "border-sky-500/40", "text-sky-300");
                dot.classList.add("bg-sky-400", "pulse-soft");
                text.textContent = "Sincronizando…";
                action.textContent = "";
            } else if (pending > 0) {
                badge.classList.add("bg-amber-500/10", "border-amber-500/40", "text-amber-300");
                dot.classList.add("bg-amber-400");
                text.textContent = `${pending} pendiente(s) de sincronizar`;
                action.textContent = "Reintentar";
            } else {
                badge.classList.add("bg-emerald-500/10", "border-emerald-500/40", "text-emerald-300");
                dot.classList.add("bg-emerald-400");
                text.textContent = "En línea · Todo sincronizado";
                action.textContent = "";
            }

            const pendingLabel = document.getElementById("pending-count");
            if (pending > 0) {
                pendingLabel.textContent = `${pending} sin enviar`;
                pendingLabel.classList.remove("hidden");
            } else {
                pendingLabel.classList.add("hidden");
            }
        },

        renderLista() {
            const ul = document.getElementById("lista-actividad");
            const empty = document.getElementById("empty-state");
            const todos = Store.getAll();
            const pedidosConFoto = new Set(todos.filter(r => r.kind === "foto").map(r => r.idPedido));
            const records = todos.filter(r => r.kind !== "foto").slice(0, 8);

            if (records.length === 0) {
                ul.innerHTML = "";
                empty.classList.remove("hidden");
                return;
            }
            empty.classList.add("hidden");

            ul.innerHTML = records.map(r => {
                const dotColor = r.synced ? "bg-emerald-400" : (r.lastError ? "bg-red-400" : "bg-amber-400");
                const tipoColor = r.tipo === "Venta" ? "text-emerald-400" : "text-sky-400";
                const statusLabel = r.synced ? "Sincronizado" : (r.lastError ? "Error de envío" : "Pendiente");
                const productoTexto = r.productoNormalizado || r.productoInput || "";
                const tieneFoto = pedidosConFoto.has(r.idPedido);
                // textContent-safe: se arma con nodos, no con HTML del usuario, para evitar inyección de markup.
                return `
                <li class="flex items-center gap-3 bg-gray-800/70 border border-gray-700 rounded-xl p-3">
                    <span class="h-2 w-2 rounded-full ${dotColor} shrink-0" title="${statusLabel}"></span>
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center justify-between gap-2">
                            <span class="font-semibold text-sm truncate">${UI.escape(r.cliente)}${tieneFoto ? ' 📷' : ''}</span>
                            <span class="text-sm font-bold tnum ${tipoColor}">${Utils.money(r.monto)}</span>
                        </div>
                        <div class="text-[11px] text-gray-500 flex items-center gap-1.5">
                            <span class="${tipoColor}">${UI.escape(r.tipo)}</span>
                            <span>·</span>
                            <span>${Utils.timeAgo(r.createdAt)}</span>
                            ${productoTexto ? `<span>·</span><span class="truncate">${UI.escape(productoTexto)}</span>` : ""}
                        </div>
                    </div>
                </li>`;
            }).join("");
        },

        // Escapado defensivo: aunque los datos sean del propio usuario de campo,
        // nunca se inyectan en innerHTML sin sanitizar (mitiga XSS si en el futuro
        // se sincronizan datos de otros orígenes, ej. notas compartidas en equipo).
        escape(str) {
            const div = document.createElement("div");
            div.textContent = str ?? "";
            return div.innerHTML;
        },

        refresh() {
            document.getElementById("kpi-ventas").textContent = Utils.money(Store.kpiVentas());
            this.renderLista();
            this.updateStatusBadge();
        }
    };

    /* =========================================================================
       LINEAS — múltiples productos por pedido, cada uno con cantidad y precio.
       El "menú desplegable" es una lista de sugerencias que aparece debajo del
       campo a medida que se escribe (autocompletado real, no un <select> fijo,
       porque necesita filtrar en vivo contra 140 productos).
       ========================================================================= */
    const Lineas = {
        items: [],

        nueva() {
            return { uid: Utils.uuid(), texto: "", productoId: null, productoNombre: null, cantidad: "", precioUnitario: "" };
        },

        reset() {
            this.items = [this.nueva()];
            this.render();
        },

        agregar() {
            this.items.push(this.nueva());
            this.render();
            requestAnimationFrame(() => {
                const cards = document.querySelectorAll(".linea-producto");
                const last = cards[cards.length - 1];
                if (last) last.querySelector(".input-linea-producto").focus();
            });
        },

        quitar(uid) {
            if (this.items.length <= 1) return;
            this.items = this.items.filter(l => l.uid !== uid);
            this.render();
        },

        subtotal(linea) {
            const c = parseFloat(linea.cantidad) || 0;
            const p = parseFloat(linea.precioUnitario) || 0;
            return c * p;
        },

        total() {
            return this.items.reduce((sum, l) => sum + this.subtotal(l), 0);
        },

        actualizarTotales(card, linea) {
            const el = card.querySelector(".linea-subtotal-valor");
            if (el) el.textContent = Utils.money(this.subtotal(linea));
            document.getElementById("total-pedido").textContent = Utils.money(this.total());
        },

        mostrarSugerencias(card, linea) {
            const caja = card.querySelector(".sugerencias-linea");
            const texto = linea.texto.trim();
            if (texto.length < 2) { caja.classList.add("hidden"); caja.innerHTML = ""; return; }

            const matches = CatalogMatch.matchProduct(texto, CATALOGO, { maxResults: 5 })
                .filter(m => m.score >= 0.4);
            if (matches.length === 0) { caja.classList.add("hidden"); caja.innerHTML = ""; return; }

            const colorConfianza = { alta: "text-emerald-400", media: "text-amber-400", baja: "text-gray-500" };
            caja.innerHTML = matches.map(m => `
                <button type="button" class="sugerencia-linea-item w-full text-left px-3 py-2.5 text-xs border-b border-gray-700 last:border-0 active:bg-gray-700"
                    data-producto-id="${m.producto.id}"
                    data-nombre="${UI.escape(m.producto.nombre_oficial)}"
                    data-precio="${m.producto.precio_referencia_usd ?? ""}">
                    <div class="font-semibold text-gray-100">${UI.escape(m.producto.nombre_oficial)}</div>
                    <div class="text-gray-500">${UI.escape(m.producto.ingrediente_activo)} <span class="${colorConfianza[m.confianza]}">· ${m.confianza}</span></div>
                </button>`).join("");
            caja.classList.remove("hidden");
        },

        seleccionar(card, linea, btn) {
            linea.texto = btn.dataset.nombre;
            linea.productoId = btn.dataset.productoId;
            linea.productoNombre = btn.dataset.nombre;
            if (!linea.precioUnitario && btn.dataset.precio) {
                linea.precioUnitario = btn.dataset.precio;
            }
            this.render();
        },

        render() {
            const cont = document.getElementById("lineas-productos");
            cont.innerHTML = this.items.map(l => `
                <div class="linea-producto bg-gray-900 border border-gray-700 rounded-xl p-3 space-y-2" data-uid="${l.uid}">
                    <div class="relative">
                        <input type="text" class="input-linea-producto w-full bg-gray-800 p-2.5 rounded-lg border border-gray-700 text-sm focus:border-emerald-500 outline-none"
                            placeholder="Producto (escribí 2+ letras)" autocomplete="off" value="${UI.escape(l.texto)}">
                        <div class="sugerencias-linea hidden absolute left-0 right-0 mt-1 bg-gray-800 border border-gray-600 rounded-lg shadow-xl z-10 max-h-56 overflow-y-auto"></div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 items-center">
                        <input type="number" class="input-linea-cantidad bg-gray-800 p-2 rounded-lg border border-gray-700 text-sm tnum" placeholder="Cant." inputmode="decimal" min="0" step="0.01" value="${l.cantidad}">
                        <input type="number" class="input-linea-precio bg-gray-800 p-2 rounded-lg border border-gray-700 text-sm tnum" placeholder="Precio U." inputmode="decimal" min="0" step="0.01" value="${l.precioUnitario}">
                        <div class="flex items-center justify-between gap-1">
                            <span class="linea-subtotal-valor text-xs font-bold tnum text-gray-300">${Utils.money(this.subtotal(l))}</span>
                            ${this.items.length > 1 ? `<button type="button" class="btn-quitar-linea text-red-400 text-sm leading-none">✕</button>` : ""}
                        </div>
                    </div>
                </div>`).join("");
            document.getElementById("total-pedido").textContent = Utils.money(this.total());
        },

        bind() {
            const cont = document.getElementById("lineas-productos");

            cont.addEventListener("input", (e) => {
                const card = e.target.closest(".linea-producto");
                if (!card) return;
                const linea = this.items.find(l => l.uid === card.dataset.uid);
                if (!linea) return;

                if (e.target.classList.contains("input-linea-producto")) {
                    linea.texto = e.target.value;
                    linea.productoId = null;
                    linea.productoNombre = null;
                    clearTimeout(linea._t);
                    linea._t = setTimeout(() => this.mostrarSugerencias(card, linea), 150);
                } else if (e.target.classList.contains("input-linea-cantidad")) {
                    linea.cantidad = e.target.value;
                    this.actualizarTotales(card, linea);
                } else if (e.target.classList.contains("input-linea-precio")) {
                    linea.precioUnitario = e.target.value;
                    this.actualizarTotales(card, linea);
                }
            });

            cont.addEventListener("click", (e) => {
                const quitarBtn = e.target.closest(".btn-quitar-linea");
                if (quitarBtn) {
                    const card = quitarBtn.closest(".linea-producto");
                    this.quitar(card.dataset.uid);
                    return;
                }
                const sugBtn = e.target.closest(".sugerencia-linea-item");
                if (sugBtn) {
                    const card = sugBtn.closest(".linea-producto");
                    const linea = this.items.find(l => l.uid === card.dataset.uid);
                    if (linea) this.seleccionar(card, linea, sugBtn);
                }
            });

            document.getElementById("btn-agregar-linea").addEventListener("click", () => this.agregar());
        }
    };

    /* =========================================================================
       FOTO — respaldo del pedido, SIN intentar leer su contenido (ver
       conversación: Tesseract.js probado contra manuscrito real, 0% útil).
       Se comprime en el celular antes de guardar/enviar para no colgarse
       con mala señal — apunta a ~100-250KB por foto.
       ========================================================================= */
    const Foto = {
        dataUrl: null,

        reset() {
            this.dataUrl = null;
            document.getElementById("input-foto").value = "";
            document.getElementById("foto-preview-cont").classList.add("hidden");
            document.getElementById("btn-foto-label").textContent = "Adjuntar foto del pedido (opcional)";
            const status = document.getElementById("foto-status");
            status.classList.add("hidden");
            status.textContent = "";
        },

        async comprimir(file) {
            const status = document.getElementById("foto-status");
            status.textContent = "Comprimiendo imagen…";
            status.classList.remove("hidden");

            try {
                const dataUrlOriginal = await new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });

                const img = await new Promise((resolve, reject) => {
                    const i = new Image();
                    i.onload = () => resolve(i);
                    i.onerror = reject;
                    i.src = dataUrlOriginal;
                });

                const MAX_DIM = 1000;
                let width = img.width, height = img.height;
                if (width > height && width > MAX_DIM) { height = Math.round(height * MAX_DIM / width); width = MAX_DIM; }
                else if (height >= width && height > MAX_DIM) { width = Math.round(width * MAX_DIM / height); height = MAX_DIM; }

                const canvas = document.createElement("canvas");
                canvas.width = width; canvas.height = height;
                canvas.getContext("2d").drawImage(img, 0, 0, width, height);
                const comprimido = canvas.toDataURL("image/jpeg", 0.5);

                this.dataUrl = comprimido;
                const kb = Math.round((comprimido.length * 3 / 4) / 1024);
                document.getElementById("foto-preview").src = comprimido;
                document.getElementById("foto-preview-cont").classList.remove("hidden");
                document.getElementById("btn-foto-label").textContent = "Cambiar foto";
                status.textContent = `Lista para guardar (~${kb} KB)`;
            } catch (err) {
                status.textContent = "No se pudo procesar la imagen, probá de nuevo.";
                this.dataUrl = null;
            }
        },

        bind() {
            document.getElementById("btn-tomar-foto").addEventListener("click", () => document.getElementById("input-foto").click());
            document.getElementById("input-foto").addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (file) this.comprimir(file);
            });
            document.getElementById("btn-quitar-foto").addEventListener("click", (e) => { e.stopPropagation(); Foto.reset(); });
        }
    };

    /* =========================================================================
       APP — orquestación y handlers de eventos
       ========================================================================= */
    const App = {
        abrirModal(tipo) {
            document.getElementById("form-tipo").value = tipo;
            const chip = document.getElementById("modal-tipo-chip");
            chip.textContent = tipo;
            chip.className = "text-xs font-bold px-2.5 py-1 rounded-full " +
                (tipo === "Venta" ? "bg-emerald-500/15 text-emerald-300" : "bg-sky-500/15 text-sky-300");

            document.getElementById("modal-backdrop").classList.remove("opacity-0", "pointer-events-none");
            document.getElementById("modal-carga").classList.remove("sheet-hidden");
            Lineas.reset();
            Foto.reset();
            setTimeout(() => document.getElementById("input-cliente").focus(), 150);
        },

        cerrarModal() {
            document.getElementById("modal-backdrop").classList.add("opacity-0", "pointer-events-none");
            document.getElementById("modal-carga").classList.add("sheet-hidden");
            document.getElementById("form-carga").reset();
            document.getElementById("error-cliente").classList.add("hidden");
            document.getElementById("error-lineas").classList.add("hidden");
            Lineas.items = [];
            Foto.reset();
        },

        manualSync() {
            if (!navigator.onLine) { UI.toast("Sin conexión todavía."); return; }
            Sync.flushQueue().then(() => UI.toast("Sincronización completa."));
        },

        handleSubmit(e) {
            e.preventDefault();

            const tipo = document.getElementById("form-tipo").value;
            const cliente = document.getElementById("input-cliente").value.trim();
            const notas = document.getElementById("input-notas").value.trim();

            let valid = true;
            if (cliente.length < 2) {
                document.getElementById("error-cliente").classList.remove("hidden");
                valid = false;
            } else {
                document.getElementById("error-cliente").classList.add("hidden");
            }

            // Solo cuentan las líneas donde Fernando escribió algo de producto.
            const lineasValidas = Lineas.items.filter(l => l.texto.trim().length > 0);
            const lineasConCantidad = lineasValidas.filter(l => parseFloat(l.cantidad) > 0);

            if (lineasValidas.length === 0 || lineasConCantidad.length !== lineasValidas.length) {
                document.getElementById("error-lineas").classList.remove("hidden");
                valid = false;
            } else {
                document.getElementById("error-lineas").classList.add("hidden");
            }

            if (!valid) return;

            const btn = document.getElementById("btn-guardar");
            btn.disabled = true;

            const idPedido = Utils.uuid();
            const createdAt = new Date().toISOString();

            lineasValidas.forEach(l => {
                const cantidad = parseFloat(l.cantidad) || 0;
                const precioUnitario = parseFloat(l.precioUnitario) || 0;
                Store.add({
                    id: Utils.uuid(),
                    kind: "venta",
                    idPedido,
                    tipo, cliente, notas,
                    monto: cantidad * precioUnitario, // subtotal de ESTA línea
                    productoInput: l.texto,
                    productoId: l.productoId,
                    productoNormalizado: l.productoNombre,
                    cantidad,
                    precioUnitario,
                    createdAt,
                    synced: false,
                    attempts: 0,
                    lastError: null
                });
            });

            if (Foto.dataUrl) {
                Store.add({
                    id: Utils.uuid(),
                    kind: "foto",
                    idPedido,
                    cliente,
                    fotoBase64: Foto.dataUrl,
                    createdAt,
                    synced: false,
                    attempts: 0,
                    lastError: null
                });
            }

            UI.refresh();
            App.cerrarModal();
            const sufijoFoto = Foto.dataUrl ? " + foto" : "";
            UI.toast(`Guardado localmente (${lineasValidas.length} producto(s)${sufijoFoto}). Sincronizando…`);

            btn.disabled = false;
            Sync.flushQueue();
        },

        init() {
            document.getElementById("form-carga").addEventListener("submit", App.handleSubmit);
            document.getElementById("modal-backdrop").addEventListener("click", App.cerrarModal);
            Lineas.bind();
            Foto.bind();

            window.addEventListener("online", () => { UI.toast("Conexión recuperada. Sincronizando…"); Sync.flushQueue(); });
            window.addEventListener("offline", () => { UI.updateStatusBadge(); UI.toast("Sin conexión. Los datos se guardan en el equipo."); });

            setInterval(() => { if (navigator.onLine) Sync.flushQueue(); }, CONFIG.RETRY_INTERVAL_MS);

            UI.refresh();
            if (navigator.onLine) Sync.flushQueue();
            if (window.lucide) lucide.createIcons();
        }
    };

    document.addEventListener("DOMContentLoaded", App.init);
    </script>
</body>
</html>
